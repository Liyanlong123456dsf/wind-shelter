<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>林间聊愈室·全链路产品卡点地图 v4.0 | 风筑小屋</title>
  <style>
    :root {
      --bg: #F7F4EE;
      --surface: #FFFFFF;
      --sidebar-w: 280px;
      --header-h: 60px;
      --accent: #7A9E6B;
      --accent2: #B8A88A;
      --accent3: #8B9EC5;
      --text: #3A3028;
      --text2: #6B5E50;
      --text-light: #9A8E80;
      --border: #E5DDD0;
      --paddington: #C4834A;
      --nick: #6B8F71;
      --eeyore: #7A8FA6;
      --phase1: #D4956A;
      --phase2: #7A9E6B;
      --phase3: #6B8FB5;
      --phase4: #9E7A6B;
      --phase5: #8B7AA0;
      --phase6: #6B9E8B;
      --shadow: 0 2px 16px rgba(58,48,40,.08);
      --radius: 14px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    /* ── HEADER ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px;
      z-index: 100; gap: 16px; box-shadow: 0 1px 8px rgba(58,48,40,.06);
    }
    .header-logo { font-size: 15px; font-weight: 700; color: var(--accent); white-space: nowrap; }
    .header-logo span { color: var(--text-light); font-weight: 400; font-size: 13px; margin-left: 6px; }
    .progress-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
    .progress-bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .4s ease; width: 0%; }
    .progress-pct { font-size: 13px; font-weight: 600; color: var(--accent); white-space: nowrap; min-width: 44px; }
    .header-stats { display: flex; gap: 16px; align-items: center; }
    .stat-chip { font-size: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; color: var(--text2); }
    .stat-chip b { color: var(--accent); }
    .header-actions { display: flex; gap: 8px; }
    .btn-icon {
      width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--text2); transition: all .2s;
    }
    .btn-icon:hover { background: var(--bg); color: var(--text); }

    /* ── LAYOUT ── */
    .layout { display: flex; height: 100vh; padding-top: var(--header-h); }
    aside {
      width: var(--sidebar-w); min-width: var(--sidebar-w); height: 100%; overflow-y: auto;
      background: var(--surface); border-right: 1px solid var(--border);
      padding: 12px 0; display: flex; flex-direction: column;
    }
    aside::-webkit-scrollbar { width: 4px; }
    aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .sidebar-phase {
      padding: 10px 16px 4px; font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-light); margin-top: 8px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 8px; padding: 7px 16px; cursor: pointer;
      font-size: 13px; color: var(--text2); border-left: 3px solid transparent;
      transition: all .15s; user-select: none;
    }
    .sidebar-item:hover { background: var(--bg); color: var(--text); }
    .sidebar-item.active { background: var(--bg); border-left-color: var(--accent); color: var(--text); font-weight: 600; }
    .sidebar-item .si-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .sidebar-item .si-dot.done { background: var(--accent); }
    .sidebar-item .si-dot.active { background: var(--accent2); }
    .sidebar-item .si-num { font-size: 11px; color: var(--text-light); min-width: 20px; }
    .sidebar-item .si-text { flex: 1; }
    .sidebar-item .si-check { font-size: 11px; }
    .sidebar-item .si-chevron { font-size: 10px; transition: transform .2s; margin-left: auto; }
    .sidebar-item.open .si-chevron { transform: rotate(90deg); }

    /* ── MAIN ── */
    main { flex: 1; overflow-y: auto; padding: 24px 28px 60px; }
    main::-webkit-scrollbar { width: 6px; }
    main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Chapter hero */
    .chapter-hero {
      margin-bottom: 24px; padding: 24px 28px; background: var(--surface);
      border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    .chapter-hero::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    }
    .chapter-hero.phase1::before { background: var(--phase1); }
    .chapter-hero.phase2::before { background: var(--phase2); }
    .chapter-hero.phase3::before { background: var(--phase3); }
    .chapter-hero.phase4::before { background: var(--phase4); }
    .chapter-hero.phase5::before { background: var(--phase5); }
    .chapter-hero.phase6::before { background: var(--phase6); }
    .chapter-hero.phaseA::before { background: var(--accent2); }
    .chapter-num { font-size: 12px; font-weight: 700; color: var(--text-light); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 4px; }
    .chapter-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .chapter-meta { font-size: 13px; color: var(--text2); display: flex; gap: 16px; flex-wrap: wrap; }
    .chapter-meta span { display: flex; align-items: center; gap: 4px; }
    .chapter-progress { margin-top: 14px; display: flex; align-items: center; gap: 10px; }
    .chapter-progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .chapter-progress-fill { height: 100%; border-radius: 99px; transition: width .3s; }
    .chapter-progress-pct { font-size: 12px; font-weight: 600; min-width: 36px; }

    /* Section */
    .section-card {
      background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
      border: 1px solid var(--border); margin-bottom: 16px; overflow: hidden;
    }
    .section-header {
      padding: 14px 20px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; user-select: none; transition: background .15s;
    }
    .section-header:hover { background: var(--bg); }
    .section-toggle { font-size: 16px; transition: transform .2s; color: var(--text2); }
    .section-header.open .section-toggle { transform: rotate(90deg); }
    .section-title { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); }
    .section-badge { font-size: 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 2px 8px; color: var(--text-light); }
    .section-badge.done { background: var(--accent); color: white; border-color: var(--accent); }
    .section-body { padding: 0 20px 16px; display: none; border-top: 1px solid var(--border); }
    .section-body.open { display: block; }
    .section-intro { padding: 12px 0 8px; font-size: 13px; color: var(--text2); line-height: 1.7; }

    /* Task items */
    .task-item {
      display: flex; align-items: flex-start; gap: 10px; padding: 10px 0;
      border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .task-item:last-child { border-bottom: none; }
    .task-item:hover .task-label { color: var(--text); }
    .task-checkbox {
      width: 20px; height: 20px; min-width: 20px; border: 2px solid var(--border);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .2s; margin-top: 1px; font-size: 12px;
    }
    .task-item.done .task-checkbox { background: var(--accent); border-color: var(--accent); color: white; }
    .task-content { flex: 1; }
    .task-label { font-size: 13px; color: var(--text2); line-height: 1.5; transition: color .2s; }
    .task-item.done .task-label { color: var(--text-light); text-decoration: line-through; }
    .task-tag { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-top: 3px; }
    .task-tag.must { background: #FEF3C7; color: #92400E; }
    .task-tag.later { background: #EFF6FF; color: #1E40AF; }
    .task-tag.optional { background: #F3F4F6; color: #6B7280; }
    .task-tag.risk { background: #FEE2E2; color: #991B1B; }

    /* Character cards */
    .char-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; padding: 8px 0; }
    .char-card { border: 1px solid var(--border); border-radius: 12px; padding: 16px; transition: all .2s; cursor: default; }
    .char-card:hover { box-shadow: 0 4px 16px rgba(58,48,40,.1); transform: translateY(-1px); }
    .char-card.paddington { border-top: 3px solid var(--paddington); }
    .char-card.nick { border-top: 3px solid var(--nick); }
    .char-card.eeyore { border-top: 3px solid var(--eeyore); }
    .char-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .char-card.paddington .char-name { color: var(--paddington); }
    .char-card.nick .char-name { color: var(--nick); }
    .char-card.eeyore .char-name { color: var(--eeyore); }
    .char-sub { font-size: 11px; color: var(--text-light); margin-bottom: 8px; }
    .char-quote { font-size: 12px; color: var(--text2); font-style: italic; line-height: 1.6; }

    /* Quote blocks */
    .quote-block {
      background: var(--bg); border-left: 3px solid var(--accent2); border-radius: 0 8px 8px 0;
      padding: 12px 16px; margin: 8px 0; font-size: 13px; color: var(--text2); line-height: 1.7;
    }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 8px 0; }
    .data-table th { background: var(--bg); padding: 8px 10px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--border); color: var(--text2); }
    .data-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: top; }
    .data-table tr:last-child td { border-bottom: none; }

    /* Source link */
    .source-link { color: var(--accent); text-decoration: none; cursor: pointer; border-bottom: 1px solid transparent; transition: border-color .2s; font-size: 12px; }
    .source-link:hover { border-bottom-color: var(--accent); }

    /* Matrix */
    .matrix { overflow-x: auto; }

    /* Back to top */
    .back-top {
      position: fixed; bottom: 24px; right: 24px; width: 40px; height: 40px;
      background: var(--accent); color: white; border: none; border-radius: 50%;
      cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(122,158,107,.4); transition: all .2s; z-index: 50;
    }
    .back-top:hover { transform: scale(1.1); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(58,48,40,.5); backdrop-filter: blur(4px);
      z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border-radius: var(--radius); max-width: 640px; width: 100%;
      max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(58,48,40,.2);
      transform: scale(.95); transition: transform .2s;
    }
    .modal-overlay.show .modal { transform: scale(1); }
    .modal-head { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close { width: 28px; height: 28px; border: none; background: var(--bg); border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--text2); }
    .modal-body { padding: 20px 24px; }
    .modal-src { font-size: 13px; color: var(--text2); line-height: 1.8; }
    .modal-src a { color: var(--accent); word-break: break-all; }

    /* Phase legend */
    .phase-legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .phase-dot { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
    .phase-dot span { width: 10px; height: 10px; border-radius: 50%; }

    /* Timeline */
    .timeline { position: relative; padding-left: 24px; }
    .timeline::before { content: ''; position: absolute; left: 6px; top: 0; bottom: 0; width: 2px; background: var(--border); }
    .timeline-item { position: relative; margin-bottom: 20px; }
    .timeline-item::before { content: ''; position: absolute; left: -18px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: 2px solid var(--surface); }
    .timeline-label { font-size: 11px; color: var(--text-light); font-weight: 600; margin-bottom: 2px; }
    .timeline-text { font-size: 13px; color: var(--text2); line-height: 1.6; }

    /* Subtasks in sections */
    .subtask { padding: 8px 0; border-bottom: 1px solid var(--border); }
    .subtask:last-child { border-bottom: none; }
    .subtask-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .subtask-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .subtask-check { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 5px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; transition: all .2s; flex-shrink: 0; }
    .subtask-check.done { background: var(--accent); border-color: var(--accent); color: white; }
    .subtask-desc { font-size: 12px; color: var(--text2); line-height: 1.6; margin-left: 26px; }
    .subtask-item.done .subtask-title { color: var(--text-light); text-decoration: line-through; }
    .subtask-item.done .subtask-desc { color: var(--text-light); }

    /* Emotion axis */
    .axis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .axis-card { border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .axis-card.anxiety { border-top: 3px solid var(--phase1); }
    .axis-card.depression { border-top: 3px solid var(--phase4); }
    .axis-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .axis-card.anxiety .axis-title { color: var(--phase1); }
    .axis-card.depression .axis-title { color: var(--phase4); }
    .axis-nodes { display: flex; flex-direction: column; gap: 6px; }
    .axis-node { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
    .axis-node-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
    .axis-arrow { text-align: center; font-size: 11px; color: var(--text-light); margin: 4px 0; }

    /* Empty */
    .empty-state { text-align: center; padding: 80px 20px; }
    .empty-state h3 { font-size: 18px; color: var(--text2); margin-bottom: 8px; }
    .empty-state p { font-size: 13px; color: var(--text-light); }

    /* Responsive */
    @media (max-width: 768px) {
      aside { display: none; }
      .axis-grid { grid-template-columns: 1fr; }
      .header-stats { display: none; }
      .chapter-hero { padding: 16px; }
      main { padding: 16px; }
    }

    /* Source modal link highlight */
    /* Source link cards */
    .source-grid { display: flex; flex-direction: column; gap: 8px; padding: 4px 0; }
    .source-card {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg);
      text-decoration: none; color: var(--text);
      transition: all .2s; cursor: pointer;
    }
    .source-card:hover {
      border-color: var(--accent); background: #f0f7ec;
      transform: translateY(-1px); box-shadow: 0 4px 16px rgba(122,158,107,.15);
    }
    .source-card-icon { font-size: 18px; flex-shrink: 0; }
    .source-card-body { flex: 1; min-width: 0; }
    .source-card-title { display: block; font-size: 13px; font-weight: 500; color: var(--text2); line-height: 1.4; }
    .source-card-url { display: block; font-size: 11px; color: var(--text-light); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .source-card-arrow { font-size: 14px; color: var(--accent); flex-shrink: 0; }
    .source-note { font-size: 13px; color: var(--text2); padding: 8px 12px; background: #fff8e6; border-radius: 8px; border: 1px solid #f0d7a0; line-height: 1.5; }

    /* Slide transition */
    .fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Emoji in chapter hero */
    .chapter-emoji { font-size: 28px; margin-bottom: 8px; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-logo">🌿 林间聊愈室<span>· 风筑小屋</span></div>
  <div class="progress-wrap">
    <div class="progress-bar-wrap"><div class="progress-bar" id="totalBar"></div></div>
    <span class="progress-pct" id="totalPct">0%</span>
  </div>
  <div class="header-stats">
    <div class="stat-chip">已完成 <b id="doneCount">0</b> / <span id="totalCount">0</span></div>
    <div class="stat-chip">章节 <b id="doneChapters">0</b></div>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="exportProgress()" title="导出进度">⬇</button>
    <button class="btn-icon" onclick="resetProgress()" title="重置">↺</button>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside id="sidebar"></aside>

  <!-- MAIN CONTENT -->
  <main id="mainContent">
    <div class="empty-state" id="emptyState">
      <div class="chapter-emoji">🌿</div>
      <h3>欢迎来到林间聊愈室</h3>
      <p>从左侧选择一个章节开始<br/>点击小节点可标记执行状态</p>
    </div>
    <div id="chapterContent" style="display:none"></div>
  </main>
</div>

<!-- SOURCE MODAL -->
<div class="modal-overlay" id="sourceModal" onclick="if(event.target===this)closeSourceModal()">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">📎 信源详情</span>
      <button class="modal-close" onclick="closeSourceModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-src" id="modalContent"></div>
    </div>
  </div>
</div>

<!-- BACK TO TOP -->
<button class="back-top" onclick="window.mainContent.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// ═══════════════════════════════════════════════════
// 章节与小节点数据
// ═══════════════════════════════════════════════════
const CHAPTERS = [
  // 第一阶段
  { phase: 1, phaseName: '第一阶段：前期立项', emoji: '🔍', chapters: [
    {
      id: '1-1', title: '1.1 市场调研', must: 4, later: 2, optional: 1, color: '#D4956A',
      sections: [
        {
          title: '📊 赛道现状分析',
          tasks: [
            { id:'1-1-1', text:'调研AI情感陪伴赛道2024-2025年市场演变（Replika、Character.AI、星野、筑梦岛）', must: true },
            { id:'1-1-2', text:'分析用户需求演变路径：猎奇尝鲜 → 浅层陪伴 → 新鲜感消退 → 深层链接', must: true },
            { id:'1-1-3', text:'梳理五大致命问题：记忆不一致、人设崩塌、模式化安慰、合规一刀切、ROI打不正', must: true },
            { id:'1-1-4', text:'输出：赛道分析报告（含市场规模、竞品格局、用户痛点）', must: true },
          ]
        },
        {
          title: '👤 目标用户画像',
          tasks: [
            { id:'1-1-5', text:'定义轻度情绪困扰的年轻人/职场人（18-35岁）', must: true },
            { id:'1-1-6', text:'绘制情绪类型分布：焦虑类（紧张/担忧/压力/恐惧/失控感）+ 低落类（疲惫/委屈/自我怀疑/孤独/无意义感）', must: true },
            { id:'1-1-7', text:'三层用户分层模型：第一层偶尔低落、第二层持续困扰、第三层需要专业帮助', must: true },
            { id:'1-1-8', text:'输出：用户画像文档 + 情绪类型分布图', later: true },
          ]
        },
        {
          title: '📈 市场规模与可行性',
          tasks: [
            { id:'1-1-9', text:'直接市场规模：中国AI情感陪伴用户约500-800万', must: true },
            { id:'1-1-10', text:'潜在市场规模：18-35岁有情绪困扰人群约3-5亿', must: true },
            { id:'1-1-11', text:'付费意愿分析：月ARPU目标 $1-3（参考Replika Pro $19.99/月）', must: true },
            { id:'1-1-12', text:'输出：市场规模与可行性报告', later: true },
          ]
        },
        {
          title: '📎 参考文献',
          tasks: [
            { id:'1-1-ref1', text:'U深研《2025年AI陪伴类应用深度研究报告》unifuncs.com/s/4kpgQZET', must: false },
            { id:'1-1-ref2', text:'微信公众号《年营收千万美金是最大谎言》mp.weixin.qq.com/s/0ec5tE0CofdC1cRJ8fvgjA', must: false },

// ═══════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════
let state = JSON.parse(localStorage.getItem('wind-shelter-state') || '{}');
let activeChapter = null;

function getTaskState(id) { return !!state[id]; }
function toggleTask(id) { state[id] = !state[id]; saveState(); updateAll(); }

function saveState() {
  localStorage.setItem('wind-shelter-state', JSON.stringify(state));
}

function countTasks() {
  let total = 0, done = 0;
  CHAPTERS.forEach(p => p.chapters.forEach(c => c.sections.forEach(s => {
    s.tasks.forEach(t => { total++; if (getTaskState(t.id)) done++; });
  })));
  return { total, done };
}

function chapterDoneCount(chapter) {
  let done = 0, total = 0;
  chapter.sections.forEach(s => s.tasks.forEach(t => { total++; if (getTaskState(t.id)) done++; }));
  return { done, total };
}

function updateHeader() {
  const { total, done } = countTasks();
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('totalBar').style.width = pct + '%';
  document.getElementById('totalPct').textContent = pct + '%';
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  let doneCh = 0;
  CHAPTERS.forEach(p => p.chapters.forEach(c => {
    const { done: d, total: t } = chapterDoneCount(c);
    if (t > 0 && d === t) doneCh++;
  }));
  document.getElementById('doneChapters').textContent = doneCh;
}

function updateSidebar() {
  const sidebar = document.getElementById('sidebar');
  const phaseColors = { 1:'#D4956A', 2:'#7A9E6B', 3:'#6B8FB5', 4:'#9E7A6B', 5:'#8B7AA0', 6:'#6B9E8B', A:'#B8A88A' };

  let html = `<div class="phase-legend" style="padding:8px 16px 4px;">
    <div class="phase-dot"><span style="background:#D4956A"></span><span>立项</span></div>
    <div class="phase-dot"><span style="background:#7A9E6B"></span><span>产品</span></div>
    <div class="phase-dot"><span style="background:#6B8FB5"></span><span>技术</span></div>
    <div class="phase-dot"><span style="background:#9E7A6B"></span><span>测试</span></div>
    <div class="phase-dot"><span style="background:#8B7AA0"></span><span>上线</span></div>
    <div class="phase-dot"><span style="background:#6B9E8B"></span><span>运营</span></div>
  </div>`;

  CHAPTERS.forEach(phase => {
    const pColor = phaseColors[phase.phase] || '#888';
    html += `<div class="sidebar-phase" style="color:${pColor}">${phase.emoji} ${phase.phaseName}</div>`;
    phase.chapters.forEach(ch => {
      const { done, total } = chapterDoneCount(ch);
      const pct = total ? Math.round(done / total * 100) : 0;
      const isActive = activeChapter === ch.id;
      const dotClass = done === total && total > 0 ? 'done' : (done > 0 ? 'active' : '');
      const checkmark = done === total && total > 0 ? '✓' : (done > 0 ? '◐' : '');
      html += `<div class="sidebar-item${isActive ? ' active' : ''}" onclick="renderChapter('${ch.id}')">
        <div class="si-dot${dotClass ? ' ' + dotClass : ''}"></div>
        <span class="si-num">${ch.id}</span>
        <span class="si-text">${ch.title}</span>
        <span class="si-check">${checkmark}</span>
      </div>`;
    });
  });
  sidebar.innerHTML = html;
}

function renderChapter(id) {
  activeChapter = id;
  let chapter = null, phase = null;
  for (const p of CHAPTERS) {
    const found = p.chapters.find(c => c.id === id);
    if (found) { chapter = found; phase = p; break; }
  }
  if (!chapter) return;

  const { done, total } = chapterDoneCount(chapter);
  const pct = total ? Math.round(done / total * 100) : 0;
  const barColor = { 1:'#D4956A', 2:'#7A9E6B', 3:'#6B8FB5', 4:'#9E7A6B', 5:'#8B7AA0', 6:'#6B9E8B', A:'#B8A88A' }[phase.phase] || '#888';
  const phaseNum = { 1:'第一阶段', 2:'第二阶段', 3:'第三阶段', 4:'第四阶段', 5:'第五阶段', 6:'第六阶段', A:'附录' }[phase.phase] || '';

  document.getElementById('emptyState').style.display = 'none';
  const content = document.getElementById('chapterContent');
  content.style.display = 'block';

  let html = `<div class="fade-in">`;

  // Hero
  html += `<div class="chapter-hero phase${phase.phase}">
    <div class="chapter-num">${phaseNum} · ${chapter.id}</div>
    <div class="chapter-title">${chapter.title}</div>
    <div class="chapter-meta">
      <span>📋 ${chapter.sections.length} 个子模块</span>
      <span>✅ ${done}/${total} 节点已完成</span>
    </div>
    <div class="chapter-progress">
      <div class="chapter-progress-bar"><div class="chapter-progress-fill" style="width:${pct}%;background:${barColor}"></div></div>
      <span class="chapter-progress-pct" style="color:${barColor}">${pct}%</span>
    </div>
  </div>`;

  // Sections
  chapter.sections.forEach((sec, si) => {
    const secDone = sec.tasks.filter(t => getTaskState(t.id)).length;
    const secTotal = sec.tasks.length;
    const secPct = secTotal ? Math.round(secDone / secTotal * 100) : 0;
    const badgeClass = secDone === secTotal && secTotal > 0 ? 'done' : '';
    const badgeText = secDone === secTotal && secTotal > 0 ? '已完成' : `${secDone}/${secTotal}`;

    html += `<div class="section-card">
      <div class="section-header open" onclick="toggleSection(this)">
        <span class="section-toggle">▼</span>
        <span class="section-title">${sec.title}</span>
        <span class="section-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="section-body open">
        <div class="section-intro">`;

    // If source section - beautiful clickable link cards
    if (sec.showAsSource && sec.sources) {
      html += `<div class="source-grid">`;
      sec.sources.forEach(src => {
        if (src.url) {
          html += `<a class="source-card" href="${src.url}" target="_blank" rel="noopener noreferrer">
            <span class="source-card-icon">🔗</span>
            <span class="source-card-body">
              <span class="source-card-title">${src.title}</span>
              <span class="source-card-url">${src.url}</span>
            </span>
            <span class="source-card-arrow">↗</span>
          </a>`;
        } else {
          html += `<div class="source-note">${src.title}</div>`;
        }
      });
      html += `</div>`;
    } else {
      sec.tasks.forEach(task => {
        const done = getTaskState(task.id);
        const tag = task.risk
          ? '<span class="task-tag risk">⚠️风险</span>'
          : (task.must
              ? '<span class="task-tag must">必须</span>'
              : (task.later ? '<span class="task-tag later">后续</span>' : '<span class="task-tag optional">可选</span>'));
        html += `<div class="task-item${done ? ' done' : ''}" onclick="event.stopPropagation();toggleTask('${task.id}')">
          <div class="task-checkbox">${done ? '✓' : ''}</div>
          <div class="task-content">
            <div class="task-label">${task.text}</div>
            ${tag}
          </div>
        </div>`;
      });
    }

    html += `</div></div></div>`;
  });

  html += `</div>`;
  content.innerHTML = html;
  updateSidebar();
  updateHeader();
  window.mainContent.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleSection(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
  const toggle = header.querySelector('.section-toggle');
  toggle.textContent = header.classList.contains('open') ? '▼' : '▶';
}

function updateAll() {
  updateHeader();
  updateSidebar();
  if (activeChapter) renderChapter(activeChapter);
}

function exportProgress() {
  const { total, done } = countTasks();
  const pct = total ? Math.round(done / total * 100) : 0;
  const lines = ['林间聊愈室·全链路产品卡点地图 执行进度'];
  lines.push(`总体进度：${done}/${total} (${pct}%)`);
  lines.push('');
  CHAPTERS.forEach(phase => {
    lines.push(`${phase.emoji} ${phase.phaseName}`);
    phase.chapters.forEach(ch => {
      const { done: d, total: t } = chapterDoneCount(ch);
      lines.push(`  ${ch.id} ${ch.title}: ${d}/${t}`);
    });
    lines.push('');
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = '风筑小屋_执行进度.txt'; a.click();
}

function resetProgress() {
  if (confirm('确定重置所有进度吗？此操作不可撤销。')) {
    state = {};
    saveState();
    updateAll();
  }
}

function openSourceModal(url) {
  const modal = document.getElementById('sourceModal');
  document.getElementById('modalContent').innerHTML = `<p>正在加载...</p>`;
  modal.classList.add('show');
  fetch(url).then(r => r.text()).then(html => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const title = doc.querySelector('title')?.textContent || url;
    document.getElementById('modalContent').innerHTML = `<p><strong>页面标题：</strong>${title}</p><p><a href="${url}" target="_blank">在新窗口打开 →</a></p>`;
  }).catch(() => {
    document.getElementById('modalContent').innerHTML = `<p>无法加载页面内容。</p><p><a href="${url}" target="_blank">在新窗口打开 →</a></p>`;
  });
}

function closeSourceModal() {
  document.getElementById('sourceModal').classList.remove('show');
}

// Init
updateAll();
</script>
